id: 001-hello-span
name: "Hello, Span"
order: 1
difficulty: rookie
concepts:
  - manual_instrumentation
  - spans
  - attributes

phase1:
  description: |
    ## What is a Span?

    A **span** represents a single unit of work inside a distributed system. Every span records a name, start time, end time, status, and a set of key-value **attributes** that describe what happened. Spans are the building block of distributed tracing.

    In production, spans let you see exactly where time is spent inside a request. Without them, all you know is "the API took 5 seconds." With spans, you know "the DB query waited 4.7 seconds for a connection pool slot — increase `pool_size` to fix it."

    ---

    **The Situation:**
    The order processing service is running slow, and we have no visibility into what's happening. The system is essentially "blind" — we need to add telemetry to see inside.

    **Your Mission:**
    Instrument the code to create a span around the order processing logic and add the order_id as an attribute.

    **Key Concepts:**
    - **Span**: A unit of work in a trace — has a name, start/end time, status, and attributes
    - **TraceProvider**: The factory that configures and creates tracers (wired to an exporter)
    - **Tracer**: The OTel object you call to create spans — one per module or service
    - **Attribute**: A key-value pair attached to a span (e.g., `order_id="ORD-42"`)
    - **Context Manager (`with` block)**: Python idiom for creating a span that auto-closes when the block exits

    **Hints:**
    1. Use the tracer to start a span
    2. Add 'order_id' as an attribute
    3. The span should cover the entire function execution

  hints:
    - "Use `tracer.start_as_current_span()` to create a span"
    - "Add attributes using `span.set_attribute()` or pass them when starting the span"
    - "Make sure the span covers the database and cache operations"

  validations:
    - type: span_exists
      description: "A span must be created around the process_order function"
      successMessage: "✓ Span created successfully"
      errorMessage: "✗ No span found. Use tracer.start_as_current_span()"
      hintMessage: "💡 Hint: Use tracer.start_as_current_span('process_order')"
      guidedMessage: "📖 Use: with tracer.start_as_current_span('process_order') as span:"

    - type: attribute_exists
      spanName: process_order
      attributeKey: order_id
      description: "The order_id must be added as a span attribute"
      successMessage: "✓ Attribute order_id added"
      errorMessage: "✗ Attribute order_id not found. Use set_attribute()"
      hintMessage: "💡 Hint: Use span.set_attribute('order_id', order_id)"
      guidedMessage: "📖 Inside the span context, add: span.set_attribute('order_id', order_id)"

    - type: telemetry_flowing
      description: "Telemetry must be properly configured and flowing"
      successMessage: "✓ Telemetry is flowing! Phase 1 complete."
      errorMessage: "✗ Telemetry not properly configured"
      hintMessage: "💡 Make sure your span covers all the function logic"
      guidedMessage: "📖 Ensure the 'with' block wraps the database and cache operations"

phase2:
  description: |
    **Investigation Phase**

    Now that telemetry is flowing, we can see what's happening!

    The traces show that the order processing is taking 5 seconds. Your job is to investigate the trace data and find the root cause.

  investigationTools:
    - traces
    - logs

  rootCauseOptions:
    - id: a
      label: "Missing index on the orders table — the UPDATE query does a full table scan"
      correct: false
      explanation: "Not quite. The trace shows db.connection_pool.wait_ms=4750, meaning 4.75 seconds were spent waiting for a connection — not executing the query itself. A missing index would slow the query, but the query barely ran."

    - id: b
      label: "DB connection pool is too small — all 5 connections are in use, new requests queue up"
      correct: true
      explanation: "✓ Exactly! The logs show \"pool_size=5, waiting=12\" — 12 requests are queued for only 5 connections. The span attribute db.connection_pool.wait_ms=4750 confirms 95% of the latency is waiting, not querying. Fix: increase pool_size or reduce connection hold time."

    - id: c
      label: "The external cache is slow — Redis is adding latency to every request"
      correct: false
      explanation: "Not quite. The cache.invalidate span took only 12ms — totally fine. The culprit is db.query at 4980ms, and most of that is connection pool wait time."

    - id: d
      label: "The order-service is CPU-bound — too many concurrent requests overwhelming the process"
      correct: false
      explanation: "No. If it were CPU-bound, you'd see spans running (not waiting). The trace clearly shows time spent in db.connection_pool.wait_ms=4750, which is blocking I/O wait — not CPU."
