id: 002-auto-magic
name: "Auto-magic"
order: 2
difficulty: rookie
languages:
  - python
  - javascript
concepts:
  - auto_instrumentation
  - http_traces
  - library_instrumentation

phase1:
  description: |
    ## What is Auto-instrumentation?

    **Auto-instrumentation** patches popular libraries at import time so spans are generated automatically — without writing any OTel SDK calls yourself. One call to `.instrument()` covers all HTTP requests, database queries, and cache operations that use the patched library.

    The OpenTelemetry Python ecosystem ships instrumentors for **100+ libraries**: `urllib3`, `requests`, `SQLAlchemy`, `Redis`, `Celery`, `FastAPI`, `Django`, and more. Zero-code telemetry for your entire framework stack.

    In production, this means you can add observability to an existing service in minutes — no refactoring, no business logic changes, no risk of introducing bugs while adding traces.

    ---

    **The Situation:**
    The checkout service makes HTTP calls to an external payment API. The service is failing for 30% of users, but you have no HTTP-level visibility — you need telemetry without modifying the business logic.

    **Your Mission:**
    Use OpenTelemetry's auto-instrumentation to make urllib HTTP calls automatically generate spans — zero code changes to the request logic itself.

    **Key Concepts:**
    - **Auto-instrumentation**: Patches libraries at import time — no manual span creation needed
    - **Instrumentation library**: A per-library adapter that hooks into the library's internal calls
    - **Bootstrapper**: The `opentelemetry-bootstrap` CLI that scans your dependencies and installs the right instrumentors
    - **Zero-code telemetry**: Full HTTP/DB/cache spans with no changes to business logic
    - **URLLibInstrumentor**: The specific instrumentor that patches `urllib` so every `urlopen()` creates a span

    **Hints:**
    1. Import and call `URLLibInstrumentor().instrument()` before making any HTTP calls
    2. The instrumentor patches urllib — calls after `.instrument()` auto-generate spans
    3. A span should appear with the HTTP method and URL as attributes

  hints:
    - "Import URLLibInstrumentor from opentelemetry.instrumentation.urllib"
    - "Call URLLibInstrumentor().instrument() before making any HTTP calls"
    - "After instrumenting, any urllib.request.urlopen() will auto-create a span"

  validations:
    - type: span_exists
      description: "An HTTP span must be auto-generated by URLLibInstrumentor"
      successMessage: "✓ HTTP span captured — auto-instrumentation is working"
      errorMessage: "✗ No HTTP spans found. Did you call URLLibInstrumentor().instrument()?"
      hintMessage: "💡 Hint: Call URLLibInstrumentor().instrument() before urlopen()"
      guidedMessage: "📖 Add before the HTTP call: URLLibInstrumentor().instrument()"

    - type: attribute_exists
      spanName: "HTTP GET"
      attributeKey: "http.url"
      description: "The HTTP span must include the http.url attribute"
      successMessage: "✓ http.url attribute present on HTTP span"
      errorMessage: "✗ http.url attribute missing — is URLLibInstrumentor active?"
      hintMessage: "💡 Hint: URLLibInstrumentor sets http.url automatically when you call urlopen()"
      guidedMessage: "📖 Ensure instrument() is called before urlopen(), not after"

    - type: telemetry_flowing
      description: "Telemetry must be flowing — at least one span captured"
      successMessage: "✓ Telemetry flowing! Phase 1 complete — head to Investigation."
      errorMessage: "✗ No telemetry captured. Run the code with URLLibInstrumentor active."
      hintMessage: "💡 Make sure URLLibInstrumentor().instrument() runs before urlopen()"
      guidedMessage: "📖 Full setup: import URLLibInstrumentor; URLLibInstrumentor().instrument(); then urllib.request.urlopen(url)"

phase2:
  description: |
    **Investigation Phase**

    Checkout is failing for 30% of users. Support tickets are flooding in.
    Your auto-instrumented traces are live — time to find out why.

    The trace waterfall shows a GET /orders root span, with a child http.client
    span calling the payment API. Investigate the span status and attributes to
    find the failing component.

  investigationTools:
    - traces
    - logs

  rootCauseOptions:
    - id: a
      label: "Payment API is returning HTTP 500 — external service is down"
      correct: true
      explanation: "✓ Exactly! The http.client span has status=ERROR and http.status_code=500. The logs confirm: 'Payment API returned 500' followed by retry attempts that all failed. The root cause is the downstream payment service — not your code. Fix: add a circuit breaker or fallback for the payment API."

    - id: b
      label: "Database connection pool exhausted — order writes are timing out"
      correct: false
      explanation: "Not quite. The trace shows no database spans at all — this checkout path goes directly from GET /orders to the payment API call. The error is on the outbound http.client span (status=ERROR, http.status_code=500), not a database operation."

    - id: c
      label: "Order service has a memory leak — GC pauses causing 500ms timeouts"
      correct: false
      explanation: "No. The total trace duration is ~200ms — too fast for a memory/GC issue. The http.client span has status=ERROR immediately from the payment API's response (http.status_code=500), not from a timeout. GC pauses would show up as slow spans, not 500 errors."

    - id: d
      label: "Network routing issue — DNS resolution failing for the payment service"
      correct: false
      explanation: "Not quite. A DNS failure would appear as a connection error (no HTTP status code). The http.client span has http.status_code=500 — meaning the payment API was reached successfully, but returned an error response. The problem is inside the payment service, not the network."
